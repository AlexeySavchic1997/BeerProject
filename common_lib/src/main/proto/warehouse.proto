syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
option java_multiple_files = true;

package warehouse_api;

service WarehouseApi {
  rpc GetWarehouseInfo (GetWarehouseInfoRequest) returns (BeerInfoResponse);

  rpc UpdateWarehouseInfo (UpdatePacket) returns (UpdateResponse);
}

enum Zone {
  ZONE_SORTING = 0;
  ZONE_BOOKED = 1;
  ZONE_UNLOADING = 2;
  ZONE_UNSPECIFIED = 3;
}

message  GetWarehouseInfoRequest {
  optional int64 id = 1 ;
  optional string sku = 2;
  optional Zone zoneType = 3;
  optional int32 amount = 4;
  optional google.protobuf.Timestamp time = 5;
}

message WarehouseBeerInfoItem {
  int64 id = 1 ;
  string sku = 2;
  Zone zoneType = 3;
  int32 amount = 4;
  google.protobuf.Timestamp time = 5;
}

message BeerInfoResponse
{
  repeated WarehouseBeerInfoItem beer = 1;
}

message UpdatePacket
{
  repeated UpdateBeerRequest request=1;
}

message UpdateBeerRequest
{
  int64 id = 1;
  int32 amount = 2;
  bool adding = 3;
  google.protobuf.Timestamp timeMark = 4;
}

message UpdateResponse
{
  bool success = 1;
  string message = 2;
}

