syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
option java_multiple_files = true;

package warehouse_api;

service WarehouseApi {
  rpc GetWarehouseInfo (GetWarehouseInfoRequest) returns (BeerInfoResponse);

  rpc UpdateWarehouseInfo (UpdatePacketRequest) returns (UpdatePacketResponse);
}

enum Zone {
  ZONE_SORTING = 0;
  ZONE_BOOKED = 1;
  ZONE_UNLOADING = 2;
  ZONE_UNSPECIFIED = 3;
}

message  GetWarehouseInfoRequest {
  optional int64 id = 1 ;
  optional string sku = 2;
  optional Zone zoneType = 3;
  optional int32 amount = 4;
  optional google.protobuf.Timestamp time = 5;
}

message BeerInfoResponse
{
  repeated WarehouseBeerInfoItem beer = 1;
}

message WarehouseBeerInfoItem {
  int64 id = 1 ;
  string sku = 2;
  Zone zone_type = 3;
  int32 amount = 4;
  google.protobuf.Timestamp time = 5;
}

message UpdatePacketRequest
{
  repeated UpdateBeerRequest request = 1;
}

message UpdateBeerRequest
{
  string sku = 1;
  int32 amount = 2;
}

message UpdatePacketResponse
{
  bool success = 1;
  string message = 2;
  repeated UnpassedOrderResponse unpassedList = 3;
}

message UnpassedOrderResponse
{
  string sku = 1;
  int32 amount = 2;
}

