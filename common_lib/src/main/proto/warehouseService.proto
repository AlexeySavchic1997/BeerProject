syntax = "proto3";
import "google/protobuf/empty.proto";
option java_multiple_files = true;

package warehouse_api;

enum Zone {
  SORTING = 0;
  BOOKED = 1;
  UNLOADING = 2;
}

message BeerInfo {
  int64 id = 1 ;
  int64 SKU = 2;
  Zone zoneType=3;
  int32 amount=4;
}

message BeerInfoList
{
  repeated BeerInfo beer=1;
}

message BeerUpdate
{
  int64 id = 1;
  int32 amount=3;
}

message BeerUpdateList
{
  repeated BeerUpdate beer=1;
}

service WarehouseApi {
  rpc GetWarehouseInfo (google.protobuf.Empty) returns (BeerInfoList);

  rpc UpdateWarehouseInfo(BeerUpdateList) returns (google.protobuf.Empty);
}
