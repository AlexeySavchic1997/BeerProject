syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
option java_multiple_files = true;

package warehouse_api;

service WarehouseApi {
  rpc GetUpdatedWarehouseInfo(google.protobuf.Timestamp) returns (BeerInfoResponse);

  rpc GetWarehouseInfo (BeerInfo) returns (BeerInfoResponse);

  rpc UpdateWarehouseInfo (UpdateBeerRequest) returns (google.protobuf.Empty);
}

enum Zone {
  SORTING = 0;
  BOOKED = 1;
  UNLOADING = 2;
}

message BeerInfo {
  int64 id = 1 ;
  string sku = 2;
  Zone zoneType = 3;
  int32 amount = 4;
}

message BeerInfoResponse
{
  repeated BeerInfo beer = 1;
}

message UpdateBeer
{
  int64 id = 1;
  int32 amount = 2;
}

message UpdateBeerRequest
{
  repeated UpdateBeer beer = 1;
}
